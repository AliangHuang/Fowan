<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Fowan Todo app icon">
  <defs>
    <linearGradient id="todo-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06324F"/>
      <stop offset="0.6" stop-color="#0C6F82"/>
      <stop offset="1" stop-color="#102E68"/>
    </linearGradient>
    <linearGradient id="todo-page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E9F6F7"/>
    </linearGradient>
    <linearGradient id="todo-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#20C997"/>
      <stop offset="1" stop-color="#128CA2"/>
    </linearGradient>
    <filter id="page-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#001B3D" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="220" fill="url(#todo-bg)"/>
  <g filter="url(#page-shadow)">
    <rect x="222" y="198" width="580" height="628" rx="112" fill="url(#todo-page)"/>
    <rect x="222" y="198" width="580" height="628" rx="112" fill="none" stroke="#FFFFFF" stroke-opacity="0.68" stroke-width="12"/>
  </g>

  <rect x="306" y="276" width="412" height="18" rx="9" fill="#128CA2" opacity="0.22"/>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="316" y="340" width="92" height="92" rx="28" stroke="#128CA2" stroke-width="24"/>
    <path d="M340 384 L368 412 L418 356" stroke="url(#todo-accent)" stroke-width="30"/>
    <path d="M486 360 H672" stroke="#173B70" stroke-opacity="0.84" stroke-width="34"/>
    <path d="M486 422 H632" stroke="#7F98A4" stroke-opacity="0.66" stroke-width="24"/>

    <rect x="316" y="512" width="92" height="92" rx="28" stroke="#128CA2" stroke-opacity="0.82" stroke-width="24"/>
    <path d="M486 532 H700" stroke="#173B70" stroke-opacity="0.80" stroke-width="34"/>
    <path d="M486 594 H636" stroke="#7F98A4" stroke-opacity="0.66" stroke-width="24"/>

    <rect x="316" y="684" width="92" height="92" rx="28" stroke="#128CA2" stroke-width="24"/>
    <path d="M340 728 L368 756 L418 700" stroke="url(#todo-accent)" stroke-width="30"/>
    <path d="M486 704 H664" stroke="#173B70" stroke-opacity="0.78" stroke-width="34"/>
