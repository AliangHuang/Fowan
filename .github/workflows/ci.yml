name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    name: Architecture and governance
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.422
      - name: Verify
        shell: pwsh
        run: ./scripts/verify.ps1
